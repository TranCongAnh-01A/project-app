# === PMKA - Docker Compose (v0.3) ===
# Khởi chạy hệ thống: PostgreSQL + Backend (FastAPI)
# Celery + Redis đã loại bỏ từ v0.3 — pipeline chạy server-side trong FastAPI.

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI + FFmpeg + yt-dlp) ────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/app/storage:/app/storage
    env_file:
      - .env
    environment:
      STORAGE_DIR: /app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
